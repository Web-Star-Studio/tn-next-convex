version: '3.8'

services:
  postgres_users: # Banco de dados para o serviço de usuários
    image: postgres:15-alpine
    container_name: tuca_postgres_users
    environment:
      POSTGRES_USER: ${DB_USERS_USERNAME:-tuca_user}
      POSTGRES_PASSWORD: ${DB_USERS_PASSWORD:-tuca_password}
      POSTGRES_DB: ${DB_USERS_DATABASE:-tuca_users_db}
    ports:
      - "${DB_USERS_PORT:-5432}:5432" # Mapeia a porta do host para a porta do container
    volumes:
      - postgres_users_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERS_USERNAME:-tuca_user} -d ${DB_USERS_DATABASE:-tuca_users_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_activities: # Banco de dados para o serviço de catálogo de atividades
    image: postgres:15-alpine
    container_name: tuca_postgres_activities
    environment:
      POSTGRES_USER: ${DB_ACTIVITIES_USERNAME:-tuca_activity_user}
      POSTGRES_PASSWORD: ${DB_ACTIVITIES_PASSWORD:-tuca_activity_password}
      POSTGRES_DB: ${DB_ACTIVITIES_DATABASE:-tuca_activities_db}
    ports:
      - "${DB_ACTIVITIES_PORT:-5433}:5432" # Porta diferente no host para evitar conflito
    volumes:
      - postgres_activities_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_ACTIVITIES_USERNAME:-tuca_activity_user} -d ${DB_ACTIVITIES_DATABASE:-tuca_activities_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis_main: # Instância Redis para sessões, cache, etc.
    image: redis:7-alpine
    container_name: tuca_redis_main
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_main_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

